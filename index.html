<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPM Colaborativo - Air Liquide</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .grid-day { transition: all 0.2s ease; }
        .grid-day:hover { transform: scale(1.2); z-index: 10; cursor: pointer; }
        .modal-bg { backdrop-filter: blur(8px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header Principal -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-[#00274c] p-3 rounded-2xl shadow-blue-900/20 shadow-lg">
                    <i data-lucide="activity" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-[#00274c] tracking-tight">DPM GLOBAL</h1>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Panel Colaborativo en Tiempo Real</p>
                </div>
            </div>

            <!-- Selector de Mes -->
            <div class="flex items-center gap-4 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-xl transition-all shadow-sm"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <span id="monthDisplay" class="font-black text-sm uppercase min-w-[140px] text-center text-slate-600"></span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-xl transition-all shadow-sm"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            </div>

            <button onclick="openModal()" class="flex items-center gap-2 bg-[#00274c] hover:bg-blue-900 text-white px-8 py-3.5 rounded-2xl font-black text-sm transition-all shadow-xl shadow-blue-900/20 active:scale-95">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> REGISTRAR HALLAZGO
            </button>
        </header>

        <!-- Estado de Conexión -->
        <div id="connectionStatus" class="mb-6 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-orange-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
            </span>
            Sincronizando con la nube...
        </div>

        <!-- Grids SQCDP -->
        <div id="gridsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-10">
            <!-- Cargando dinámicamente -->
        </div>

        <!-- Tabla de Eventos Globales -->
        <section class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                    <h2 class="text-xl font-black text-[#00274c]">LOG DE EVENTOS COMPARTIDOS</h2>
                    <p class="text-slate-400 text-xs font-medium">Registros visibles para toda la organización</p>
                </div>
                <div id="totalBadge" class="bg-[#00274c] text-white px-4 py-1.5 rounded-full text-[10px] font-black italic">
                    0 REGISTROS
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest">
                            <th class="px-8 py-6">Fecha</th>
                            <th class="px-8 py-6">KPI</th>
                            <th class="px-8 py-6">Descripción del Suceso</th>
                            <th class="px-8 py-6">Responsable</th>
                            <th class="px-8 py-6">Plan de Acción</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTable" class="divide-y divide-slate-100">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal de Registro -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-bg bg-slate-900/60">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-xl overflow-hidden shadow-blue-900/40">
            <div class="bg-[#00274c] p-10 text-white">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-3xl font-black tracking-tight">Nuevo Registro</h3>
                    <button onclick="closeModal()" class="bg-white/10 hover:bg-white/20 p-2 rounded-full transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <p class="text-blue-200/60 text-xs font-bold uppercase tracking-widest italic">Reporte centralizado de desviaciones</p>
            </div>
            
            <form id="eventForm" class="p-10 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Categoría KPI</label>
                        <select id="f-category" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                            <option>Seguridad</option>
                            <option>Calidad</option>
                            <option>Costo</option>
                            <option>Entrega</option>
                            <option>Cliente</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha del Suceso</label>
                        <input type="date" id="f-date" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Descripción del Evento</label>
                    <textarea id="f-desc" placeholder="Detalle lo ocurrido de forma clara..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 h-32 font-medium focus:border-[#00274c] outline-none transition-all" required></textarea>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Responsable</label>
                        <input type="text" id="f-resp" placeholder="Nombre Apellido" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Plan de Acción</label>
                        <input type="text" id="f-action" placeholder="Contramedida" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                    </div>
                </div>

                <div class="pt-6 flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-black text-sm tracking-widest">CANCELAR</button>
                    <button type="submit" id="submitBtn" class="flex-1 bg-[#00274c] text-white py-4 rounded-2xl font-black text-sm tracking-widest shadow-xl shadow-blue-900/20 hover:bg-blue-800 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> GUARDAR Y COMPARTIR
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuración Global proporcionada por el entorno
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'air-liquide-dpm-v1';
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Estado Local
        let sharedEvents = [];
        let currentDate = new Date();
        const categories = [
            { id: 'Seguridad', icon: 'shield-alert', color: 'bg-blue-600' },
            { id: 'Calidad', icon: 'check-circle-2', color: 'bg-teal-600' },
            { id: 'Costo', icon: 'trending-down', color: 'bg-orange-600' },
            { id: 'Entrega', icon: 'truck', color: 'bg-purple-600' },
            { id: 'Cliente', icon: 'user-check', color: 'bg-indigo-600' }
        ];

        // 1. Autenticación (Regla 3)
        async function startApp() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        document.getElementById('connectionStatus').innerHTML = `
                            <span class="flex h-2 w-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                            CONECTADO AL SERVIDOR GLOBAL
                        `;
                        listenToEvents();
                    }
                });
            } catch (err) {
                console.error("Error de conexión:", err);
            }
        }

        // 2. Escuchar Cambios en la Nube (Regla 1)
        function listenToEvents() {
            // Ruta obligatoria: /artifacts/{appId}/public/data/{collection}
            const eventsCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
            
            onSnapshot(eventsCol, (snapshot) => {
                sharedEvents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateUI();
            }, (error) => {
                console.error("Error en tiempo real:", error);
            });
        }

        // 3. UI y Renderizado
        function updateUI() {
            renderMonth();
            renderGrids();
            renderTable();
            lucide.createIcons();
        }

        function renderMonth() {
            const options = { month: 'long', year: 'numeric' };
            document.getElementById('monthDisplay').innerText = currentDate.toLocaleDateString('es-ES', options);
        }

        function renderGrids() {
            const container = document.getElementById('gridsContainer');
            container.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            categories.forEach(cat => {
                let gridHTML = `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                        <div class="p-5 border-b border-slate-50 flex items-center gap-3">
                            <div class="p-2 bg-slate-50 rounded-xl text-slate-600">
                                <i data-lucide="${cat.icon}" class="w-4 h-4"></i>
                            </div>
                            <h4 class="text-xs font-black text-[#00274c] uppercase tracking-tighter">${cat.id}</h4>
                        </div>
                        <div class="p-4 grid grid-cols-7 gap-1.5 bg-white">
                `;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const hasEvent = sharedEvents.some(e => e.date === dateStr && e.category === cat.id);
                    const colorClass = hasEvent ? 'bg-red-500 shadow-lg shadow-red-200' : 'bg-emerald-500 opacity-80';
                    gridHTML += `<div class="grid-day aspect-square ${colorClass} text-white text-[9px] font-black flex items-center justify-center rounded-md">${d}</div>`;
                }

                gridHTML += `</div></div>`;
                container.insertAdjacentHTML('beforeend', gridHTML);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('eventsTable');
            const totalBadge = document.getElementById('totalBadge');
            
            const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
            const monthEvents = sharedEvents.filter(e => e.date.startsWith(currentMonthStr));
            
            totalBadge.innerText = `${monthEvents.length} REGISTROS`;
            tbody.innerHTML = '';

            if (monthEvents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-8 py-16 text-center text-slate-400 italic text-sm font-medium">No hay eventos reportados globalmente para este periodo.</td></tr>';
                return;
            }

            monthEvents.sort((a,b) => b.timestamp - a.timestamp).forEach(e => {
                const row = `
                    <tr class="hover:bg-slate-50/80 transition-colors">
                        <td class="px-8 py-6 text-sm font-bold text-slate-700">${e.date}</td>
                        <td class="px-8 py-6">
                            <span class="bg-red-100 text-red-700 border border-red-200 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter">
                                ${e.category}
                            </span>
                        </td>
                        <td class="px-8 py-6 text-sm text-slate-500 max-w-sm">${e.description}</td>
                        <td class="px-8 py-6 text-sm font-black text-slate-800 italic underline decoration-blue-200 underline-offset-4">${e.responsible}</td>
                        <td class="px-8 py-6 text-sm text-slate-400 font-medium italic">${e.actionPlan || 'Pendiente'}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // 4. Guardar Nuevo Evento (Escritura en Nube)
        window.saveEvent = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "COMPARTIENDO...";

            const newEvent = {
                category: document.getElementById('f-category').value,
                date: document.getElementById('f-date').value,
                description: document.getElementById('f-desc').value,
                responsible: document.getElementById('f-resp').value,
                actionPlan: document.getElementById('f-action').value,
                timestamp: Date.now()
            };

            try {
                const eventsCol = collection(db, 'artifacts', appId, 'public', 'data', 'events');
                await addDoc(eventsCol, newEvent);
                
                document.getElementById('eventForm').reset();
                window.closeModal();
                alert(`Reporte guardado. Se ha notificado a franco.avila@airliquide.com`);
            } catch (err) {
                alert("Error al guardar en la nube. Revise su conexión.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="w-4 h-4"></i> GUARDAR Y COMPARTIR`;
                lucide.createIcons();
            }
        };

        // Navegación Global
        window.changeMonth = (dir) => {
            currentDate.setMonth(currentDate.getMonth() + dir);
            updateUI();
        };

        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.getElementById('eventForm').addEventListener('submit', window.saveEvent);
        document.getElementById('f-date').valueAsDate = new Date();

        // Iniciar
        startApp();
        renderMonth();
        lucide.createIcons();
    </script>
</body>
</html>
