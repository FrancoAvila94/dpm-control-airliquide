<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPM Control - Air Liquide</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#00274c] p-2 rounded-lg">
                    <i data-lucide="trending-down" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-[#00274c]">FIT Value - DPM Control</h1>
                    <p class="text-slate-500 text-sm italic">"Si no lo mides, no puedes mejorarlo"</p>
                </div>
            </div>

            <div class="flex items-center gap-4 bg-white p-2 rounded-full shadow-sm border border-slate-200">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="chevron-left"></i></button>
                <span id="currentMonthDisplay" class="font-semibold capitalize min-w-[140px] text-center"></span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="chevron-right"></i></button>
            </div>

            <button onclick="openModal()" class="flex items-center gap-2 bg-[#00274c] hover:bg-[#003a70] text-white px-6 py-2.5 rounded-lg font-medium transition-all shadow-md">
                <i data-lucide="plus"></i> Registrar Evento
            </button>
        </header>

        <!-- Grids Visuales -->
        <div id="categoryGrids" class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-8">
            <!-- Se llena con JS -->
        </div>

        <!-- Tabla de Historial -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-xl font-bold text-[#00274c] flex items-center gap-2">
                    <i data-lucide="alert-triangle" class="text-orange-500"></i> Historial de Acciones
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">Fecha</th>
                            <th class="px-6 py-4">Categoría</th>
                            <th class="px-6 py-4">Descripción</th>
                            <th class="px-6 py-4">Responsable</th>
                            <th class="px-6 py-4">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody" class="divide-y divide-slate-100">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal Formulario -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden">
            <div class="bg-[#00274c] p-6 text-white flex justify-between items-center">
                <h3 class="text-xl font-bold">Nuevo Registro DPM</h3>
                <button onclick="closeModal()"><i data-lucide="x"></i></button>
            </div>
            <form id="eventForm" class="p-8 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Categoría</label>
                        <select id="f-category" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2">
                            <option>Seguridad</option>
                            <option>Calidad</option>
                            <option>Costo</option>
                            <option>Entrega</option>
                            <option>Cliente</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Fecha</label>
                        <input type="date" id="f-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Descripción</label>
                    <textarea id="f-desc" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 h-24" required></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Responsable</label>
                    <input type="text" id="f-resp" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">Plan de Acción</label>
                    <input type="text" id="f-action" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2">
                </div>
                <div class="pt-4 flex gap-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 text-slate-500 font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 bg-[#00274c] text-white py-3 rounded-xl font-bold">Guardar y Enviar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Estado de la aplicación
        let events = JSON.parse(localStorage.getItem('dpm_events')) || [];
        let currentDate = new Date();
        const categories = [
            { id: 'Seguridad', icon: 'shield-alert' },
            { id: 'Calidad', icon: 'check-circle-2' },
            { id: 'Costo', icon: 'trending-down' },
            { id: 'Entrega', icon: 'truck' },
            { id: 'Cliente', icon: 'user-check' }
        ];

        // Inicializar
        function init() {
            renderMonth();
            renderGrids();
            renderTable();
            lucide.createIcons();
            document.getElementById('f-date').valueAsDate = new Date();
        }

        function renderMonth() {
            const options = { month: 'long', year: 'numeric' };
            document.getElementById('currentMonthDisplay').innerText = currentDate.toLocaleDateString('es-ES', options);
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            renderMonth();
            renderGrids();
            renderTable();
        }

        function renderGrids() {
            const container = document.getElementById('categoryGrids');
            container.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            categories.forEach(cat => {
                let gridHTML = `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-3 bg-slate-50 border-b border-slate-100 flex items-center gap-2">
                            <i data-lucide="${cat.icon}" class="w-4 h-4 text-[#00274c]"></i>
                            <span class="text-xs font-bold uppercase">${cat.id}</span>
                        </div>
                        <div class="p-3 grid grid-cols-7 gap-1">
                `;

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const hasEvent = events.some(e => e.date === dateStr && e.category === cat.id);
                    const colorClass = hasEvent ? 'bg-red-500' : 'bg-emerald-500';
                    gridHTML += `<div class="aspect-square ${colorClass} text-white text-[9px] flex items-center justify-center rounded-sm">${d}</div>`;
                }

                gridHTML += `</div></div>`;
                container.insertAdjacentHTML('beforeend', gridHTML);
            });
            lucide.createIcons();
        }

        function renderTable() {
            const tbody = document.getElementById('eventsTableBody');
            tbody.innerHTML = '';
            
            events.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(e => {
                const row = `
                    <tr class="text-sm">
                        <td class="px-6 py-4 font-medium">${e.date}</td>
                        <td class="px-6 py-4"><span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">${e.category}</span></td>
                        <td class="px-6 py-4 text-slate-600">${e.description}</td>
                        <td class="px-6 py-4 font-semibold">${e.responsible}</td>
                        <td class="px-6 py-4 text-slate-500 italic">${e.actionPlan || '---'}</td>
                    </tr>
                `;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        }

        // Modal y Formulario
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('eventForm').onsubmit = function(e) {
            e.preventDefault();
            const newEvent = {
                id: Date.now(),
                category: document.getElementById('f-category').value,
                date: document.getElementById('f-date').value,
                description: document.getElementById('f-desc').value,
                responsible: document.getElementById('f-resp').value,
                actionPlan: document.getElementById('f-action').value
            };

            events.push(newEvent);
            localStorage.setItem('dpm_events', JSON.stringify(events));
            
            // Simular envío de email
            console.log("Enviando reporte a franco.avila@airliquide.com...");
            
            this.reset();
            closeModal();
            renderGrids();
            renderTable();
            alert("Evento registrado y reporte enviado a franco.avila@airliquide.com");
        };

        window.onload = init;
    </script>
</body>
</html>
