<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPM Global - Air Liquide</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .grid-day { transition: all 0.2s ease; }
        .grid-day:hover { transform: scale(1.15); z-index: 10; cursor: pointer; }
        .modal-bg { backdrop-filter: blur(12px); transition: all 0.3s ease; }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="bg-[#00274c] p-3 rounded-2xl shadow-lg">
                    <i data-lucide="activity" class="text-white w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-[#00274c] tracking-tight">DPM GLOBAL</h1>
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Panel Operacional Colaborativo</p>
                </div>
            </div>

            <div class="flex items-center gap-4 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-xl transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <span id="monthDisplay" class="font-black text-xs uppercase min-w-[140px] text-center text-slate-600"></span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-xl transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
            </div>

            <button onclick="openModal()" class="flex items-center gap-2 bg-[#00274c] hover:bg-blue-900 text-white px-8 py-3.5 rounded-2xl font-black text-sm transition-all shadow-xl shadow-blue-900/10 active:scale-95">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> REGISTRAR HALLAZGO
            </button>
        </header>

        <!-- Barra de Estado de Conexión -->
        <div id="statusBanner" class="mb-6 p-4 rounded-2xl flex items-center justify-between text-[10px] font-black uppercase tracking-widest transition-colors duration-500">
            <div class="flex items-center gap-3">
                <span id="statusIndicator" class="relative flex h-3 w-3">
                    <span class="status-pulse absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
                </span>
                <span id="statusText">Inicializando sistema...</span>
            </div>
            <div id="modeBadge" class="px-3 py-1 bg-slate-200 text-slate-500 rounded-full">DETECTANDO MODO</div>
        </div>

        <!-- Dashboard de Grillas -->
        <div id="gridsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-10">
            <!-- Render dinámico -->
        </div>

        <!-- Log de Eventos -->
        <section class="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-black text-[#00274c]">LOG DE EVENTOS</h2>
                    <p class="text-slate-400 text-xs font-medium">Historial de desviaciones detectadas</p>
                </div>
                <div id="totalBadge" class="bg-[#00274c] text-white px-4 py-2 rounded-full text-[10px] font-black">
                    0 REGISTROS
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-slate-400 text-[10px] font-black uppercase tracking-widest bg-slate-50">
                            <th class="px-8 py-6">Fecha</th>
                            <th class="px-8 py-6">KPI</th>
                            <th class="px-8 py-6">Descripción</th>
                            <th class="px-8 py-6">Responsable</th>
                            <th class="px-8 py-6">Plan de Acción</th>
                        </tr>
                    </thead>
                    <tbody id="eventsTable" class="divide-y divide-slate-100 text-sm">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal Formulario -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 modal-bg bg-slate-900/60">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-xl overflow-hidden scale-in">
            <div class="bg-[#00274c] p-10 text-white">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-3xl font-black tracking-tight">Nuevo Registro</h3>
                    <button onclick="closeModal()" class="hover:bg-white/20 p-2 rounded-full transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <p class="text-blue-200/60 text-xs font-bold uppercase tracking-widest italic">Reporte de desviaciones SQCDP</p>
            </div>
            
            <form id="eventForm" class="p-10 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">KPI Afectado</label>
                        <select id="f-category" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                            <option>Seguridad</option>
                            <option>Calidad</option>
                            <option>Costo</option>
                            <option>Entrega</option>
                            <option>Cliente</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Fecha Evento</label>
                        <input type="date" id="f-date" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Descripción del Suceso</label>
                    <textarea id="f-desc" placeholder="Describa el problema..." class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 h-28 font-medium focus:border-[#00274c] outline-none transition-all" required></textarea>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Responsable</label>
                        <input type="text" id="f-resp" placeholder="Nombre" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all" required>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Contramedida</label>
                        <input type="text" id="f-action" placeholder="Plan de acción" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-4 font-bold focus:border-[#00274c] outline-none transition-all">
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" class="w-full bg-[#00274c] text-white py-5 rounded-2xl font-black text-sm tracking-widest shadow-xl shadow-blue-900/20 hover:bg-blue-800 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="save" class="w-5 h-5"></i> GUARDAR REPORTE
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Variables Globales
        let sharedEvents = [];
        let currentDate = new Date();
        let isCloudMode = false;
        let db, auth;
        const categories = [
            { id: 'Seguridad', icon: 'shield-alert' },
            { id: 'Calidad', icon: 'check-circle-2' },
            { id: 'Costo', icon: 'trending-down' },
            { id: 'Entrega', icon: 'truck' },
            { id: 'Cliente', icon: 'user-check' }
        ];

        // Inicialización Segura
        async function init() {
            try {
                // Verificar si existe la configuración (entorno colaborativo)
                if (typeof __firebase_config !== 'undefined') {
                    const config = JSON.parse(__firebase_config);
                    const app = initializeApp(config);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;
                    
                    await signInAnonymously(auth);
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            setConnectionUI('online');
                            listenToCloud();
                        }
                    });
                } else {
                    throw new Error("Configuración no encontrada");
                }
            } catch (err) {
                console.warn("Modo Local activado:", err.message);
                setConnectionUI('local');
                isCloudMode = false;
                loadLocalData();
            }
            updateUI();
        }

        function setConnectionUI(mode) {
            const banner = document.getElementById('statusBanner');
            const text = document.getElementById('statusText');
            const badge = document.getElementById('modeBadge');
            const indicator = document.getElementById('statusIndicator').firstElementChild;

            if (mode === 'online') {
                banner.className = "mb-6 p-4 rounded-2xl flex items-center justify-between text-[10px] font-black uppercase tracking-widest bg-emerald-50 text-emerald-600 border border-emerald-100";
                text.innerText = "Sincronizado con Servidor Central (Modo Colaborativo)";
                badge.innerText = "NUBE ACTIVA";
                badge.className = "px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full";
                indicator.className = "status-pulse absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                indicator.nextElementSibling.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
            } else {
                banner.className = "mb-6 p-4 rounded-2xl flex items-center justify-between text-[10px] font-black uppercase tracking-widest bg-amber-50 text-amber-600 border border-amber-100";
                text.innerText = "Trabajando en Local (Sin conexión colaborativa)";
                badge.innerText = "MODO LOCAL";
                badge.className = "px-3 py-1 bg-amber-100 text-amber-700 rounded-full";
                indicator.className = "absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75";
                indicator.nextElementSibling.className = "relative inline-flex rounded-full h-3 w-3 bg-amber-500";
            }
        }

        // Lógica de Datos
        function listenToCloud() {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-dpm';
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'events');
            onSnapshot(col, (snap) => {
                sharedEvents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                updateUI();
            });
        }

        function loadLocalData() {
            sharedEvents = JSON.parse(localStorage.getItem('dpm_local_events')) || [];
            updateUI();
        }

        // UI Core
        function updateUI() {
            renderMonth();
            renderGrids();
            renderTable();
            lucide.createIcons();
        }

        function renderMonth() {
            document.getElementById('monthDisplay').innerText = currentDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
        }

        function renderGrids() {
            const container = document.getElementById('gridsContainer');
            container.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            categories.forEach(cat => {
                let html = `
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col">
                        <div class="p-4 border-b border-slate-50 flex items-center gap-2">
                            <i data-lucide="${cat.icon}" class="w-4 h-4 text-[#00274c]"></i>
                            <span class="text-[10px] font-black uppercase tracking-tighter text-slate-500">${cat.id}</span>
                        </div>
                        <div class="p-4 grid grid-cols-7 gap-1">
                `;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const fail = sharedEvents.some(e => e.date === dateStr && e.category === cat.id);
                    html += `<div class="aspect-square grid-day rounded-md flex items-center justify-center text-[9px] font-black text-white ${fail ? 'bg-red-500 shadow-md shadow-red-100' : 'bg-emerald-500 opacity-80'}">${d}</div>`;
                }
                html += `</div></div>`;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('eventsTable');
            const currentMonthStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
            const filtered = sharedEvents.filter(e => e.date && e.date.startsWith(currentMonthStr));
            
            document.getElementById('totalBadge').innerText = `${filtered.length} REGISTROS`;
            tbody.innerHTML = filtered.length ? '' : '<tr><td colspan="5" class="p-12 text-center text-slate-400 italic">No hay registros para este periodo.</td></tr>';

            filtered.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)).forEach(e => {
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-5 font-bold text-slate-700">${e.date}</td>
                        <td class="px-8 py-5"><span class="bg-red-50 text-red-600 px-3 py-1 rounded-full font-black text-[10px] uppercase border border-red-100">${e.category}</span></td>
                        <td class="px-8 py-5 text-slate-500 font-medium">${e.description}</td>
                        <td class="px-8 py-5 font-black text-slate-800 italic underline decoration-blue-200 underline-offset-4">${e.responsible}</td>
                        <td class="px-8 py-5 text-slate-400 italic">${e.actionPlan || 'Pendiente'}</td>
                    </tr>
                `);
            });
        }

        // Acciones
        window.saveEvent = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const data = {
                category: document.getElementById('f-category').value,
                date: document.getElementById('f-date').value,
                description: document.getElementById('f-desc').value,
                responsible: document.getElementById('f-resp').value,
                actionPlan: document.getElementById('f-action').value,
                timestamp: Date.now()
            };

            if (isCloudMode) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-dpm';
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'events'), data);
            } else {
                sharedEvents.push(data);
                localStorage.setItem('dpm_local_events', JSON.stringify(sharedEvents));
                updateUI();
            }

            document.getElementById('eventForm').reset();
            window.closeModal();
            btn.disabled = false;
        };

        window.changeMonth = (dir) => { currentDate.setMonth(currentDate.getMonth() + dir); updateUI(); };
        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        document.getElementById('eventForm').addEventListener('submit', window.saveEvent);
        document.getElementById('f-date').valueAsDate = new Date();
        init();
    </script>
</body>
</html>
